<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="mainTitle">号码展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0px;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 0px; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 0px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        h1:hover { transform: scale(1.03); }

        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        .number-group {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .group-title {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .numbers-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap;
            gap: 8px;
            width: 100%;
        }

        .numbers-container.compact { gap: 4px; }

        .numbers-container.kl8-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            row-gap: 12px;
            column-gap: 8px;
            width: 100%;
        }

        .numbers-container.kl8-grid .number-ball {
            margin: 0 auto;
        }

        .number-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            animation: popIn 0.5s ease;
            flex-shrink: 0;
        }

        .number-ball.small { width: 48px; height: 48px; font-size: 24px; }

        .number-ball.red {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .number-ball.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .separator {
            width: 2px;
            height: 35px;
            background: #ddd;
            margin: 0 4px;
            flex-shrink: 0;
        }

        .separator.compact { margin: 0 2px; }

        .error-container { text-align: center; padding: 40px 20px; }
        .error-message { background: #fee; color: #c33; padding: 20px; border-radius: 10px; margin-bottom: 20px; }

        .copy-toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 9999;
            animation: fadeInOut 1.5s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .container { padding: 20px 0px; }
            h1 { font-size: 20px; }
            .number-ball { width: 48px; height: 48px; font-size: 23px; }
            .number-ball.small { width: 46px; height: 46px; font-size: 23px; }
            .number-group { padding: 15px; }
            .numbers-container { gap: 5px; }
            .numbers-container.compact { gap: 3px; }
            .numbers-container.kl8-grid { column-gap: 5px; row-gap: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="content">
        <h1 id="pageTitle">号码展示</h1>
        <p class="subtitle" id="subtitle"></p>
        <div id="numbersContainer"></div>
    </div>
</div>

<script>
    // ── 共用编解码字典（与 index.html 完全一致） ─────────────────────────
    const B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
    // SSQ:  6红球×6bits + 1蓝球×4bits = 40bits → 7个Base64字符/组
    // DLT:  5前区×6bits + 3后区×4bits = 42bits → 7个Base64字符/组
    //       （5+2时第3个后区为0，解码时0表示不存在）
    // KL8:  10红球×7bits = 70bits → 12个Base64字符/组
    const SSQ_BITS = [6,6,6,6,6,6, 5];  // 蓝球1-16需要5bits
    const DLT_BITS = [6,6,6,6,6, 4,4,4];
    const KL8_BITS = [7,7,7,7,7,7,7,7,7,7];  // 红球1-80需要7bits

    function getSchema(type) {
        if (type === 'ssq') return SSQ_BITS;
        if (type === 'dlt') return DLT_BITS;
        if (type === 'kl8') return KL8_BITS;
        return null;
    }

    function charsPerGroup(type) {
        const schema = getSchema(type);
        const bits = schema.reduce((a, b) => a + b, 0);
        return Math.ceil(bits / 6);
    }

    function _unpack(str, bitLens) {
        let bits = [...str].map(c => B64.indexOf(c).toString(2).padStart(6, '0')).join('');
        let pos = 0;
        return bitLens.map(len => { const v = parseInt(bits.slice(pos, pos + len), 2); pos += len; return v; });
    }

    function decodeGroups(type, data) {
        const schema = getSchema(type);
        const groupChars = charsPerGroup(type);
        const groups = [];
        for (let i = 0; i + groupChars <= data.length; i += groupChars) {
            const values = _unpack(data.slice(i, i + groupChars), schema);
            if (type === 'dlt') {
                // 最后一个后区为0 → 5+2；否则 → 5+3
                groups.push(values[7] === 0 ? values.slice(0, 7) : values.slice(0, 8));
            } else {
                groups.push(values);
            }
        }
        return groups;
    }
    // ─────────────────────────────────────────────────────────────────────

    let globalNumbers = null;

    function parseNumbers() {
        const params = new URLSearchParams(window.location.search);

        // 新格式：?t=s|d&v=<encoded>
        // 旧格式：?type=ssq|dlt&data=<raw>  （向下兼容）
        let type, numbers;

        if (params.has('t') && params.has('v')) {
            // 新紧凑格式
            const t = params.get('t');
            type = t === 's' ? 'ssq' : t === 'd' ? 'dlt' : t === 'k' ? 'kl8' : null;
            if (!type) { showError('无效的彩票类型参数'); return null; }
            const v = params.get('v');
            if (!v || v.length % charsPerGroup(type) !== 0) { showError('URL 数据格式错误'); return null; }
            numbers = decodeGroups(type, v);
            if (!numbers.length) { showError('无法解码号码数据'); return null; }

        } else if (params.has('type') && params.has('data')) {
            // 旧明文格式（向下兼容）
            type = params.get('type');
            if (type !== 'ssq' && type !== 'dlt' && type !== 'kl8') { showError('未知的彩票类型'); return null; }
            const raw = params.get('data');
            numbers = raw.split('|').map(g => g.split(',').map(n => parseInt(n)));

        } else {
            showError('无效的 URL 参数');
            return null;
        }

        globalNumbers = { type, numbers };
        return globalNumbers;
    }

    function renderNumbers() {
        const result = parseNumbers();
        if (!result) return;

        const { type, numbers } = result;
        const pageTitle = document.getElementById('pageTitle');
        const subtitle = document.getElementById('subtitle');
        const mainTitle = document.getElementById('mainTitle');
        const container = document.getElementById('numbersContainer');

        const now = new Date();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayOfWeek = now.getDay();
        const weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

        if (type === 'ssq') {
            const title = `${month}月${date}日 ${weekDays[dayOfWeek]} 双色球号码`;
            mainTitle.textContent = title;
            pageTitle.textContent = title;
            subtitle.textContent = '6 个红球 + 1 个蓝球';
        } else if (type === 'dlt') {
            const title = `${month}月${date}日 ${weekDays[dayOfWeek]} 大乐透号码`;
            mainTitle.textContent = title;
            pageTitle.textContent = title;
            subtitle.textContent = '5 个前区 + 2~3 个后区';
        } else {
            const title = `${month}月${date}日 ${weekDays[dayOfWeek]} 快乐八号码`;
            mainTitle.textContent = title;
            pageTitle.textContent = title;
            subtitle.textContent = '10 个红球';
        }

        pageTitle.onclick = copyAllNumbers;
        container.innerHTML = '';

        numbers.forEach((group, index) => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'number-group';

            const titleEl = document.createElement('div');
            titleEl.className = 'group-title';
            titleEl.textContent = `第 ${index + 1} 组`;
            groupDiv.appendChild(titleEl);

            const isCompact = (type === 'dlt' && group.length === 8);
            const numbersContainer = document.createElement('div');
            numbersContainer.className = 'numbers-container' + (isCompact ? ' compact' : '');
            if (type === 'kl8') numbersContainer.classList.add('kl8-grid');

            if (type === 'ssq') {
                for (let i = 0; i < 6; i++) {
                    const ball = createBall(group[i], 'red', false);
                    ball.style.animationDelay = `${i * 0.1}s`;
                    numbersContainer.appendChild(ball);
                }
                numbersContainer.appendChild(createSeparator(false));
                const blueBall = createBall(group[6], 'blue', false);
                blueBall.style.animationDelay = '0.6s';
                numbersContainer.appendChild(blueBall);
            } else if (type === 'dlt') {
                for (let i = 0; i < 5; i++) {
                    const ball = createBall(group[i], 'red', isCompact);
                    ball.style.animationDelay = `${i * 0.1}s`;
                    numbersContainer.appendChild(ball);
                }
                numbersContainer.appendChild(createSeparator(isCompact));
                for (let i = 5; i < group.length; i++) {
                    const ball = createBall(group[i], 'blue', isCompact);
                    ball.style.animationDelay = `${i * 0.1}s`;
                    numbersContainer.appendChild(ball);
                }
            } else {
                // kl8：10 个红球，无蓝球分隔
                for (let i = 0; i < group.length; i++) {
                    const ball = createBall(group[i], 'red', true);
                    ball.style.animationDelay = `${i * 0.06}s`;
                    numbersContainer.appendChild(ball);
                }
            }

            groupDiv.appendChild(numbersContainer);
            container.appendChild(groupDiv);
        });
    }

    function createBall(number, type, small) {
        const ball = document.createElement('div');
        ball.className = `number-ball ${type}${small ? ' small' : ''}`;
        ball.textContent = number.toString().padStart(2, '0');
        return ball;
    }

    function createSeparator(compact) {
        const sep = document.createElement('div');
        sep.className = 'separator' + (compact ? ' compact' : '');
        return sep;
    }

    function copyAllNumbers() {
        if (!globalNumbers || !globalNumbers.numbers) { showToast('暂无号码可复制'); return; }
        const copyText = globalNumbers.numbers
            .map(group => group.map(n => n.toString().padStart(2, '0')).join(' '))
            .join('\n');
        navigator.clipboard.writeText(copyText).then(() => {
            showToast('✅ 已复制全部号码到剪贴板');
        }).catch(() => {
            showToast('❌ 复制失败，请重试');
        });
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => document.body.removeChild(toast), 1500);
    }

    function showError(message) {
        document.getElementById('content').innerHTML = `
            <div class="error-container">
                <div class="error-message">${message}</div>
            </div>`;
    }

    renderNumbers();
</script>
</body>
</html>
