<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩票号码管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .lottery-type {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .lottery-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lottery-btn.active {
            background: #667eea;
            color: white;
        }

        .lottery-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .number-groups {
            margin-bottom: 30px;
        }

        /* 长条输入框样式 */
        .group-item {
            margin-bottom: 18px;
        }

        .group-label {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            display: block;
        }

        .group-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .group-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .tip {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 彩票号码管理</h1>
        
        <div class="error-message" id="errorMessage"></div>

        <div class="lottery-type">
            <button class="lottery-btn active" data-type="ssq">双色球</button>
            <button class="lottery-btn" data-type="dlt">大乐透</button>
        </div>

        <div class="number-groups" id="numberGroups">
        </div>

        <button class="submit-btn" onclick="generatePage()">生成展示页面</button>
    </div>

    <script>
        let currentLotteryType = 'ssq';

        // 渲染 5 个长条输入框
        function renderNumberInputs() {
            const container = document.getElementById('numberGroups');
            container.innerHTML = '';

            let tipText = currentLotteryType === 'ssq' 
                ? '格式：6 红 + 1 蓝，用空格、逗号、斜杠分隔' 
                : '格式：5 前 + 2 后，用空格、逗号、斜杠分隔';

            for (let i = 1; i <= 5; i++) {
                const html = `
                    <div class="group-item">
                        <label class="group-label">第 ${i} 组</label>
                        <input type="text" class="group-input" id="group-${i}" placeholder="${tipText}">
                    </div>
                `;
                container.innerHTML += html;
            }
        }

        // 切换彩票类型
        document.querySelectorAll('.lottery-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.lottery-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLotteryType = this.dataset.type;
                renderNumberInputs();
            });
        });

        // 智能分割号码（支持空格 / 逗号 / 斜杠）
        function splitNumbers(str) {
            return str.trim()
                .replace(/[,\s\/\-、]+/g, ',')  // 统一转成逗号
                .split(',')
                .filter(n => n)
                .map(n => parseInt(n))
                .filter(n => !isNaN(n));
        }

        // 生成页面
        function generatePage() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';

            const numbers = [];
            const requiredCount = currentLotteryType === 'ssq' ? 7 : 7; // 都是 7 个

            for (let i = 1; i <= 5; i++) {
                const val = document.getElementById(`group-${i}`).value.trim();
                if (!val) {
                    showError(`第 ${i} 组不能为空`);
                    return;
                }

                const nums = splitNumbers(val);

                if (nums.length !== requiredCount) {
                    showError(`第 ${i} 组必须输入 ${requiredCount} 个号码`);
                    return;
                }

                // 验证范围
                if (currentLotteryType === 'ssq') {
                    for (let j = 0; j < 6; j++) {
                        if (nums[j] < 1 || nums[j] > 33) {
                            showError(`第 ${i} 组红球必须在 1-33 之间`);
                            return;
                        }
                    }
                    if (nums[6] < 1 || nums[6] > 16) {
                        showError(`第 ${i} 组蓝球必须在 1-16 之间`);
                        return;
                    }
                } else {
                    for (let j = 0; j < 5; j++) {
                        if (nums[j] < 1 || nums[j] > 35) {
                            showError(`第 ${i} 组前区必须在 1-35 之间`);
                            return;
                        }
                    }
                    for (let j = 5; j < 7; j++) {
                        if (nums[j] < 1 || nums[j] > 12) {
                            showError(`第 ${i} 组后区必须在 1-12 之间`);
                            return;
                        }
                    }
                }

                numbers.push(nums.join(','));
            }

            const url = `show.html?type=${currentLotteryType}&data=${encodeURIComponent(numbers.join('|'))}`;
            window.location.href = url;
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        renderNumberInputs();
    </script>
</body>
</html>
