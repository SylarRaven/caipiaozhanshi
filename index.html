<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩票号码管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }

        .lottery-type { display: flex; gap: 15px; margin-bottom: 30px; }

        .lottery-btn {
            flex: 1; padding: 15px;
            border: 2px solid #667eea;
            background: white; color: #667eea;
            border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
        }
        .lottery-btn.active { background: #667eea; color: white; }
        .lottery-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.3); }

        .number-groups { margin-bottom: 20px; }

        .group-item { margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .group-item-inner { flex: 1; }

        .group-label { font-size: 14px; font-weight: 600; color: #667eea; margin-bottom: 8px; display: block; }

        .group-input {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; outline: none; transition: all 0.2s ease;
        }
        .group-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }

        .delete-btn {
            width: 34px; height: 34px; border-radius: 50%;
            border: 2px solid #f5576c; background: white; color: #f5576c;
            font-size: 20px; line-height: 1; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s ease; margin-top: 22px;
        }
        .delete-btn:hover { background: #f5576c; color: white; }

        .add-group-btn {
            width: 100%; padding: 13px;
            border: 2px dashed #667eea; background: white; color: #667eea;
            border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; margin-bottom: 20px;
        }
        .add-group-btn:hover:not(:disabled) { background: rgba(102,126,234,0.08); }
        .add-group-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .group-count-tip { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 20px; margin-top: -12px; }

        .submit-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }

        .error-message {
            background: #fee; color: #c33; padding: 15px;
            border-radius: 10px; margin-bottom: 20px; text-align: center; display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 彩票号码管理</h1>

    <div class="error-message" id="errorMessage"></div>

    <div class="lottery-type">
        <button class="lottery-btn active" data-type="ssq">双色球</button>
        <button class="lottery-btn" data-type="dlt">大乐透</button>
        <button class="lottery-btn" data-type="kl8">快乐八</button>
    </div>

    <div class="number-groups" id="numberGroups"></div>

    <button class="add-group-btn" id="addGroupBtn" onclick="addGroup()">＋ 添加一组</button>
    <p class="group-count-tip" id="groupCountTip"></p>

    <button class="submit-btn" onclick="generatePage()">生成展示页面</button>
</div>

<script>
    // ── 共用编解码字典（与 show.html 完全一致） ──────────────────────────
    const B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
    // SSQ:  6红球×6bits + 1蓝球×4bits = 40bits → 7个Base64字符/组
    // DLT:  5前区×6bits + 3后区×4bits = 42bits → 7个Base64字符/组
    //       （5+2时第3个后区填0，解码时0表示不存在）
    // KL8:  10红球×7bits = 70bits → 12个Base64字符/组
    const SSQ_BITS = [6,6,6,6,6,6, 5];  // 蓝球1-16需要5bits
    const DLT_BITS = [6,6,6,6,6, 4,4,4];
    const KL8_BITS = [7,7,7,7,7,7,7,7,7,7];  // 红球1-80需要7bits

    function getSchema(type) {
        if (type === 'ssq') return SSQ_BITS;
        if (type === 'dlt') return DLT_BITS;
        if (type === 'kl8') return KL8_BITS;
        return null;
    }

    function charsPerGroup(type) {
        const schema = getSchema(type);
        const bits = schema.reduce((a, b) => a + b, 0);
        return Math.ceil(bits / 6);
    }

    function _pack(values, bitLens) {
        let bits = '';
        for (let i = 0; i < bitLens.length; i++)
            bits += values[i].toString(2).padStart(bitLens[i], '0');
        while (bits.length % 6) bits += '0';
        return [...bits.match(/.{6}/g)].map(b => B64[parseInt(b, 2)]).join('');
    }

    function encodeGroups(type, groups) {
        const schema = getSchema(type);
        return groups.map(group => {
            // DLT 5+2：末位补0占位，解码时0即表示无第3个后区
            const values = (type === 'dlt' && group.length === 7) ? [...group, 0] : [...group];
            return _pack(values, schema);
        }).join('');   // 每组字符数固定（由 charsPerGroup 决定），组间无需分隔符
    }
    // ─────────────────────────────────────────────────────────────────────

    let currentLotteryType = 'ssq';
    let groupCount = 0;
    const MAX_GROUPS = 20;

    function getTipText() {
        if (currentLotteryType === 'ssq') return '6 红 + 1 蓝，用空格 / 逗号 / 斜杠分隔';
        if (currentLotteryType === 'dlt') return '5 前 + 2~3 后，用空格 / 逗号 / 斜杠分隔';
        return '10 个号码（1-80），用空格 / 逗号 / 斜杠分隔';
    }

    function updateAddBtn() {
        document.getElementById('addGroupBtn').disabled = groupCount >= MAX_GROUPS;
        document.getElementById('groupCountTip').textContent = `当前 ${groupCount} 组（最多 ${MAX_GROUPS} 组）`;
    }

    function addGroup() {
        if (groupCount >= MAX_GROUPS) return;
        groupCount++;
        const id = `group-${groupCount}`;
        const item = document.createElement('div');
        item.className = 'group-item';
        item.id = `item-${groupCount}`;
        item.innerHTML = `
            <div class="group-item-inner">
                <label class="group-label">第 ${groupCount} 组</label>
                <input type="text" class="group-input" id="${id}" placeholder="${getTipText()}">
            </div>
            <button class="delete-btn" onclick="removeGroup(${groupCount})" title="删除本组">×</button>
        `;
        document.getElementById('numberGroups').appendChild(item);
        updateAddBtn();
        document.getElementById(id).focus();
    }

    function removeGroup(index) {
        const item = document.getElementById(`item-${index}`);
        if (item) item.remove();
        groupCount--;
        renumberGroups();
        updateAddBtn();
    }

    function renumberGroups() {
        const items = document.querySelectorAll('.group-item');
        groupCount = items.length;
        items.forEach((item, i) => {
            const num = i + 1;
            item.id = `item-${num}`;
            item.querySelector('.group-label').textContent = `第 ${num} 组`;
            const input = item.querySelector('.group-input');
            input.id = `group-${num}`;
            input.placeholder = getTipText();
            item.querySelector('.delete-btn').setAttribute('onclick', `removeGroup(${num})`);
        });
    }

    document.querySelectorAll('.lottery-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.lottery-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentLotteryType = this.dataset.type;
            document.querySelectorAll('.group-input').forEach(input => {
                input.placeholder = getTipText();
            });
        });
    });

    function splitNumbers(str) {
        return str.trim()
            .replace(/[,\s\/\-、]+/g, ',')
            .split(',')
            .filter(n => n)
            .map(n => parseInt(n))
            .filter(n => !isNaN(n));
    }

    function generatePage() {
        document.getElementById('errorMessage').style.display = 'none';

        if (groupCount === 0) { showError('请至少添加一组号码'); return; }

        const groups = [];
        const items = document.querySelectorAll('.group-item');

        for (let i = 0; i < items.length; i++) {
            const num = i + 1;
            const input = items[i].querySelector('.group-input');
            const val = input.value.trim();

            if (!val) { showError(`第 ${num} 组不能为空`); input.focus(); return; }

            const nums = splitNumbers(val);

            if (currentLotteryType === 'ssq') {
                if (nums.length !== 7) {
                    showError(`第 ${num} 组必须输入 7 个号码（6 红 + 1 蓝）`);
                    input.focus(); return;
                }
                for (let j = 0; j < 6; j++) {
                    if (nums[j] < 1 || nums[j] > 33) {
                        showError(`第 ${num} 组红球必须在 1-33 之间`); return;
                    }
                }
                if (nums[6] < 1 || nums[6] > 16) {
                    showError(`第 ${num} 组蓝球必须在 1-16 之间`); return;
                }
            } else if (currentLotteryType === 'dlt') {
                if (nums.length !== 7 && nums.length !== 8) {
                    showError(`第 ${num} 组必须输入 7 或 8 个号码（5 前区 + 2~3 后区）`);
                    input.focus(); return;
                }
                for (let j = 0; j < 5; j++) {
                    if (nums[j] < 1 || nums[j] > 35) {
                        showError(`第 ${num} 组前区必须在 1-35 之间`); return;
                    }
                }
                for (let j = 5; j < nums.length; j++) {
                    if (nums[j] < 1 || nums[j] > 12) {
                        showError(`第 ${num} 组后区必须在 1-12 之间`); return;
                    }
                }
            } else if (currentLotteryType === 'kl8') {
                if (nums.length !== 10) {
                    showError(`第 ${num} 组必须输入 10 个号码`);
                    input.focus(); return;
                }
                for (let j = 0; j < 10; j++) {
                    if (nums[j] < 1 || nums[j] > 80) {
                        showError(`第 ${num} 组号码必须在 1-80 之间`); return;
                    }
                }
            }

            groups.push(nums);
        }

        // 编码并跳转，使用紧凑 URL
        const encoded = encodeGroups(currentLotteryType, groups);
        const typeLetter = currentLotteryType === 'ssq' ? 's' : currentLotteryType === 'dlt' ? 'd' : 'k';
        window.location.href = `show.html?t=${typeLetter}&v=${encoded}`;
    }

    function showError(message) {
        const el = document.getElementById('errorMessage');
        el.textContent = message;
        el.style.display = 'block';
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    addGroup(); addGroup(); addGroup();
</script>
</body>
</html>
